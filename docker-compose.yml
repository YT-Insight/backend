x-backend-service: &backend-service
  build:
    context: .
    dockerfile: Dockerfile
  image: yt-insight-backend:latest
  env_file:
    - .env
  restart: unless-stopped
  environment:
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    DATABASE_HOST: db
    DATABASE_PORT: "5432"
    REDIS_URL: redis://redis:6379/0

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME must be set}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER must be set}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:?DATABASE_USER must be set} -d ${DATABASE_NAME:?DATABASE_NAME must be set}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    <<: *backend-service
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    <<: *backend-service
    command: celery -A config worker --loglevel=info --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
